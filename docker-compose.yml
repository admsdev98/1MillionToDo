services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/todo_app}
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
