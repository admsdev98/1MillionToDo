services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      # Note: the Docker image sets NODE_ENV=production, so JWT_SECRET must not be the default.
      # This is a demo value (not a real secret). Override via env for anything serious.
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-this}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/todo_app}
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
